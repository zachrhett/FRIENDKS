<div id="app">
<!--=========================================================

==========================================================-->

    <div id="executiveDashboardScreen" class="friend-screen"></div>

    <div id="analyticsScreen"
         class="friend-screen"
         style="display:none;"></div>

    <div id="storeScorecardScreen"
         class="friend-screen"
         style="display:none;"></div>

    <div id="leaderFocusScreen"
         class="friend-screen"
         style="display:none;"></div>

    <div id="guidedActionsScreen"
         class="friend-screen"
         style="display:none;"></div>

    <div id="maximoScreen"
         class="friend-screen"
         style="display:none;"></div>

    <div id="executiveAIScreen"
         class="friend-screen"
         style="display:none;"></div>

    <div id="notificationsScreen"
         class="friend-screen"
         style="display:none;"></div>

    <button
        id="friendVoiceButton"
        aria-label="F.R.I.E.N.D. Voice Assistant">

        🎤

    </button>

    <div
        id="friendVoiceStatus"
        class="friend-voice-status">

        Listening...

    </div>

    <nav class="friend-dashboard-nav">

        <button class="friend-nav-button active" data-route="executive">
            Executive
        </button>

        <button class="friend-nav-button" data-route="analytics">
            Analytics
        </button>

        <button class="friend-nav-button" data-route="scorecard: "storeScorecardScreen">
            Scorecard
        </button>

        <button class="friend-nav-button" data-route="leader">
            Leader
        </button>

        <button class="friend-nav-button" data-route="guided">
            Guided
        </button>

        <button class="friend-nav-button" data-route="maximo">
            Maximo
        </button>

        <button class="friend-nav-button" data-route="ai">
            AI
        </button>

    </nav>

</div>

    window.addEventListener("load",()=>{

        navigator.serviceWorker.register("sw.js");

    });

}
