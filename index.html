<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>F.R.I.E.N.D. System</title>

<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/scorecard.css">
<link rel="stylesheet" href="css/leader-focus.css">
<link rel="stylesheet" href="css/guided-actions.css">
<link rel="stylesheet" href="css/analytics.css">
<link rel="stylesheet" href="css/maximo.css">
<link rel="stylesheet" href="css/executive-dashboard.css">
<link rel="stylesheet" href="css/executive-ai.css">
<link rel="stylesheet" href="css/notifications.css">
<link rel="stylesheet" href="css/voice-assistant.css">

</head>

<body>

<div id="app">

    <div id="executiveDashboardScreen" class="friend-screen"></div>

    <div id="analyticsScreen" class="friend-screen" style="display:none;"></div>

    <div id="storeScorecardScreen" class="friend-screen" style="display:none;"></div>

    <div id="leaderFocusScreen" class="friend-screen" style="display:none;"></div>

    <div id="guidedActionsScreen" class="friend-screen" style="display:none;"></div>

    <div id="maximoScreen" class="friend-screen" style="display:none;"></div>

    <div id="executiveAIScreen" class="friend-screen" style="display:none;"></div>

    <div id="notificationsScreen" class="friend-screen" style="display:none;"></div>

    <button id="friendVoiceButton" aria-label="F.R.I.E.N.D. Voice Assistant">
        🎤
    </button>

    <div id="friendVoiceStatus" class="friend-voice-status">
        Listening...
    </div>

    <nav class="friend-dashboard-nav">

        <button class="friend-nav-button active" data-route="executive">
            Executive
        </button>

        <button class="friend-nav-button" data-route="analytics">
            Analytics
        </button>

        <button class="friend-nav-button" data-route="scorecard">
            Scorecard
        </button>

        <button class="friend-nav-button" data-route="leader">
            Leader
        </button>

        <button class="friend-nav-button" data-route="guided">
            Guided
        </button>

        <button class="friend-nav-button" data-route="maximo">
            Maximo
        </button>

        <button class="friend-nav-button" data-route="ai">
            AI
        </button>

        <button class="friend-nav-button" data-route="notifications">
            Alerts
        </button>

    </nav>

</div>

<script src="js/event-bus.js"></script>
<script src="js/state-store.js"></script>
<script src="js/dashboard-router.js"></script>
<script src="js/screen-renderer.js"></script>
<script src="js/ui-bindings.js"></script>

<script src="js/scorecard.js"></script>
<script src="js/leader-focus.js"></script>
<script src="js/guided-actions.js"></script>
<script src="js/analytics.js"></script>
<script src="js/maximo.js"></script>
<script src="js/executive-dashboard.js"></script>
<script src="js/executive-ai.js"></script>
<script src="js/notifications.js"></script>
<script src="js/voice-assistant.js"></script>

<script src="system-controller.js"></script>

</body>
</html>
